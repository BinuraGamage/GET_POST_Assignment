<!DOCTYPE html>
<html>
<head>
<title>User</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top,rgb(126, 0, 0),black);
}

.card{
    width:420px;
    padding:50px;
    border-radius:20px;
    background:black;
    text-align:center;
    box-shadow:0 20px 40px rgba(73, 69, 69, 0.5);
}

h1{
    color:white;
    font-size:42px;
    margin-bottom:30px;
}

a{
    color:gray;
    text-decoration:none;
    font-size:16px;
}

a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="card">

<h1 id="welcome"></h1>

<a href="index.html">Go Back</a>

</div>

<script>

async function loadUser(){

    const response = await fetch("http://localhost:5000/api/user");
    const data = await response.json();

    document.getElementById("welcome").innerText =
        "Hello, " + data.username + "!";
}

loadUser();

</script>

</body>
</html>
